server {
  listen 80;
  server_name automation.optimumprimeit.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 308 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name automation.optimumprimeit.com;

  ssl_certificate     /etc/letsencrypt/live/automation.optimumprimeit.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/automation.optimumprimeit.com/privkey.pem;

  # hardening básico
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  location / {
    proxy_pass http://serenart_n8n:5678;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # websockets (n8n los usa)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
