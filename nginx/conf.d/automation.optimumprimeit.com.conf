map $http_origin $cors_origin {
    default "";
    "~^https://serenart-prod-[a-z0-9-]+-optimumprimeit-vercel-team\.vercel\.app$" $http_origin;
    "https://serenart.art" $http_origin;
    "https://www.serenart.art" $http_origin;
}

server {
  listen 80;
  server_name automation.optimumprimeit.com;
  client_max_body_size 50M;
  
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 308 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name automation.optimumprimeit.com;

  ssl_certificate     /etc/letsencrypt/live/automation.optimumprimeit.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/automation.optimumprimeit.com/privkey.pem;

  # hardening básico
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  location / {
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin" always;
    add_header Access-Control-Max-Age 86400 always;

    if ($request_method = OPTIONS) {
      return 204;
    }
    
    proxy_pass http://serenart_n8n:5678;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # websockets (n8n los usa)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
